<!DOCTYPE html>
<html lang="en" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}bizantine-watcher{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script src="https://unpkg.com/htmx-ext-sse@2.3.0/sse.js"></script>
  <script>
    tailwind.config = { darkMode: 'class' };
    if (localStorage.getItem('theme') === 'dark' ||
        (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
    function toggleDarkMode() {
      const html = document.documentElement;
      html.classList.toggle('dark');
      localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
    }
    function showToast(message, type) {
      const container = document.getElementById('toast-container');
      const colors = {
        success: 'bg-green-600',
        error: 'bg-red-600',
        info: 'bg-gray-800 dark:bg-gray-700',
      };
      const el = document.createElement('div');
      el.className = (colors[type] || colors.info) + ' text-white px-4 py-3 rounded-lg shadow-lg text-sm max-w-sm cursor-pointer transition-opacity duration-300';
      el.textContent = message;
      el.onclick = () => el.remove();
      container.appendChild(el);
      setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 4000);
    }
  </script>
  <style>
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline-block; }
    .htmx-request.htmx-indicator { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 1s linear infinite; display: inline-block; width: 1em; height: 1em; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 min-h-screen">
  <nav class="bg-gray-900 dark:bg-gray-800 text-white px-4 sm:px-6 py-3 shadow-md">
    <div class="flex items-center gap-4 sm:gap-6 flex-wrap">
      <a href="/" class="font-bold text-lg tracking-tight hover:text-gray-300 whitespace-nowrap">bizantine-watcher</a>
      <div class="flex items-center gap-3 sm:gap-4 text-sm flex-wrap">
        <a href="/" class="hover:text-gray-300 {% block nav_dashboard %}{% endblock %}">Dashboard</a>
        <a href="/leaderboard" class="hover:text-gray-300 {% block nav_leaderboard %}{% endblock %}">Leaderboard</a>
        <a href="/tests" class="hover:text-gray-300 {% block nav_tests %}{% endblock %}">Tests</a>
        <a href="/ollama" class="hover:text-gray-300 {% block nav_ollama %}{% endblock %}">Ollama</a>
        <a href="/compare" class="hover:text-gray-300 {% block nav_compare %}{% endblock %}">Compare</a>
      </div>
      <div class="ml-auto flex items-center gap-3">
        <a href="/runs/new"
           class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-3 py-1.5 rounded-md transition-colors whitespace-nowrap">
          New Run
        </a>
        <button onclick="toggleDarkMode()" class="text-gray-400 hover:text-white transition-colors" title="Toggle dark mode">
          <svg class="w-5 h-5 hidden dark:block" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"/></svg>
          <svg class="w-5 h-5 block dark:hidden" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/></svg>
        </button>
      </div>
    </div>
  </nav>
  <main class="max-w-7xl mx-auto px-4 py-6 sm:py-8">
    {% block content %}{% endblock %}
  </main>

  <!-- Toast container -->
  <div id="toast-container" class="fixed bottom-4 right-4 z-50 space-y-2"></div>
</body>
</html>
