{% extends "base.html" %}
{% block title %}Ollama Models — llm-bug-bench{% endblock %}
{% block nav_ollama %}text-white font-semibold{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">Ollama Models</h1>

<!-- Ollama URL config -->
<div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg shadow-sm p-4 mb-6">
  <div class="flex items-center gap-3">
    <label class="text-sm font-medium text-gray-600 dark:text-gray-400 whitespace-nowrap">Ollama URL</label>
    <input id="ollama-url-input" type="text" value="{{ ollama_url }}"
           class="flex-1 px-3 py-1.5 rounded-md border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    <button onclick="setOllamaUrl()"
            class="bg-gray-700 hover:bg-gray-600 text-white text-sm px-3 py-1.5 rounded-md transition-colors">
      Update
    </button>
  </div>
</div>

<!-- Pull model -->
<div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg shadow-sm p-4 mb-6">
  <h2 class="text-sm font-semibold uppercase text-gray-500 dark:text-gray-400 mb-3">Pull Model</h2>
  <div class="flex items-center gap-3">
    <input id="pull-model-name" type="text" placeholder="e.g. llama3:8b"
           class="flex-1 px-3 py-1.5 rounded-md border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    <button onclick="pullModel()"
            class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-1.5 rounded-md transition-colors">
      Pull
    </button>
  </div>
  <div id="pull-progress" class="mt-3 hidden">
    <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2.5">
      <div id="pull-bar" class="bg-blue-600 h-2.5 rounded-full transition-all" style="width: 0%"></div>
    </div>
    <p id="pull-status" class="text-xs text-gray-500 dark:text-gray-400 mt-1"></p>
  </div>
</div>

<!-- Model list -->
<div id="model-list">
  {% include "ollama/_model_list.html" %}
</div>

<script>
function setOllamaUrl() {
  const url = document.getElementById('ollama-url-input').value.trim();
  fetch('/api/ollama/url', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({url})
  }).then(() => {
    htmx.ajax('GET', '/api/ollama/models', {target: '#model-list'});
  });
}

function pullModel() {
  const name = document.getElementById('pull-model-name').value.trim();
  if (!name) return;

  const progress = document.getElementById('pull-progress');
  const bar = document.getElementById('pull-bar');
  const status = document.getElementById('pull-status');
  progress.classList.remove('hidden');
  bar.style.width = '0%';
  status.textContent = 'Starting...';

  const evtSource = new EventSource('/api/ollama/pull?' + new URLSearchParams({}));

  fetch('/api/ollama/pull', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({name})
  }).then(response => {
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    function read() {
      reader.read().then(({done, value}) => {
        if (done) {
          progress.classList.add('hidden');
          htmx.ajax('GET', '/api/ollama/models', {target: '#model-list'});
          return;
        }
        buffer += decoder.decode(value, {stream: true});
        const lines = buffer.split('\n');
        buffer = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          try {
            const data = JSON.parse(line.slice(6));
            if (data.status === 'done') {
              progress.classList.add('hidden');
              htmx.ajax('GET', '/api/ollama/models', {target: '#model-list'});
              showToast('Model pulled successfully', 'success');
              return;
            }
            if (data.status === 'error') {
              status.textContent = 'Error: ' + data.error;
              showToast('Pull failed: ' + data.error, 'error');
              return;
            }
            bar.style.width = data.percent + '%';
            status.textContent = data.status + (data.percent ? ' (' + data.percent + '%)' : '');
          } catch(e) {}
        }
        read();
      });
    }
    read();
  });
}

function deleteModel(name) {
  if (!confirm('Delete model "' + name + '"?')) return;
  fetch('/api/ollama/models/' + encodeURIComponent(name), {method: 'DELETE'})
    .then(r => r.json())
    .then(data => {
      htmx.ajax('GET', '/api/ollama/models', {target: '#model-list'});
      if (data.ok) showToast('Model "' + name + '" deleted', 'info');
      else if (data.error) showToast('Delete failed: ' + data.error, 'error');
    });
}
</script>
{% endblock %}
