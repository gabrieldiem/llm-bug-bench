{% extends "base.html" %}
{% block title %}Dashboard — llm-bug-bench{% endblock %}
{% block nav_dashboard %}text-white font-semibold{% endblock %}
{% block content %}
<div class="flex items-center justify-between mb-6">
  <h1 class="text-2xl font-bold">Dashboard</h1>
  <div class="flex gap-4 text-sm">
    <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg px-4 py-2 shadow-sm">
      <span class="text-gray-500 dark:text-gray-400">Models</span>
      <span class="ml-2 font-bold">{{ total_models }}</span>
    </div>
    <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg px-4 py-2 shadow-sm">
      <span class="text-gray-500 dark:text-gray-400">Runs</span>
      <span class="ml-2 font-bold">{{ total_runs }}</span>
    </div>
  </div>
</div>

<div class="overflow-x-auto" id="dashboard-table">
  {% include "partials/_dashboard_table.html" %}
</div>
{% endblock %}
