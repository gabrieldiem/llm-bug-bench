{% extends "base.html" %}
{% block title %}New Run — llm-bug-bench{% endblock %}
{% block content %}
<div class="mb-4 text-sm text-gray-500 dark:text-gray-400">
  <a href="/" class="hover:underline text-blue-600 dark:text-blue-400">Dashboard</a> /
  <span class="font-semibold text-gray-700 dark:text-gray-200">New Run</span>
</div>

<div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg shadow-sm p-6 max-w-3xl">
  <h1 class="text-xl font-bold mb-6">Configure Benchmark Run</h1>

  <!-- Provider selector -->
  <div class="mb-5">
    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Provider</label>
    <div class="flex gap-2">
      <button type="button" onclick="selectProvider('ollama')" id="btn-ollama"
              class="provider-btn px-4 py-2 rounded-md text-sm font-medium border transition-colors">
        Ollama
      </button>
      <button type="button" onclick="selectProvider('openai')" id="btn-openai"
              class="provider-btn px-4 py-2 rounded-md text-sm font-medium border transition-colors">
        OpenAI
      </button>
      <button type="button" onclick="selectProvider('gemini')" id="btn-gemini"
              class="provider-btn px-4 py-2 rounded-md text-sm font-medium border transition-colors">
        Gemini
      </button>
      <button type="button" onclick="selectProvider('llamacpp')" id="btn-llamacpp"
              class="provider-btn px-4 py-2 rounded-md text-sm font-medium border transition-colors">
        llama.cpp
      </button>
    </div>
  </div>

  <!-- Ollama-specific fields -->
  <div id="ollama-fields">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
      <!-- Single model input (shown when batch mode is off) -->
      <div id="single-model-field">
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Model Name *</label>
        <input id="run-model" type="text" list="ollama-models" placeholder="e.g. llama3:8b"
               class="px-3 py-1.5 rounded-md border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-sm w-full focus:outline-none focus:ring-2 focus:ring-blue-500">
        <datalist id="ollama-models"></datalist>
      </div>
      <!-- Batch models textarea (shown when batch mode is on) -->
      <div id="batch-models-field" class="hidden">
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Models (one per line) *</label>
        <textarea id="run-batch-models" rows="4" placeholder="llama3:8b&#10;mistral:7b&#10;phi3:mini"
                  class="px-3 py-1.5 rounded-md border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-sm w-full font-mono focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Ollama URL</label>
        <input id="run-api-url" type="text" value="{{ ollama_url }}/v1"
               class="px-3 py-1.5 rounded-md border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-sm w-full focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
    </div>
    <!-- Batch mode toggle -->
    <div class="mb-5">
      <label class="flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300">
        <input id="batch-mode" type="checkbox" onchange="toggleBatchMode()" class="rounded border-gray-300 dark:border-gray-600">
        Batch Mode <span class="text-gray-400 dark:text-gray-500 font-normal">(run multiple models sequentially)</span>
      </label>
    </div>
  </div>

  <!-- llama.cpp-specific fields -->
  <div id="llamacpp-fields" class="hidden">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-5">
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Model Name *</label>
        <input id="run-llamacpp-model" type="text" list="llamacpp-models" placeholder="Model loaded on server"
               class="px-3 py-1.5 rounded-md border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-sm w-full focus:outline-none focus:ring-2 focus:ring-blue-500">
        <datalist id="llamacpp-models"></datalist>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Server URL</label>
        <input id="run-llamacpp-url" type="text" value="{{ llamacpp_url }}"
               class="px-3 py-1.5 rounded-md border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-sm w-full focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
    </div>
  </div>

  <!-- OpenAI / Gemini fields -->
  <div id="cloud-fields" class="hidden">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-5">
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Model Name *</label>
        <input id="run-cloud-model" type="text" list="cloud-models" placeholder="e.g. gpt-4o, gemini-2.5-flash"
               class="px-3 py-1.5 rounded-md border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-sm w-full focus:outline-none focus:ring-2 focus:ring-blue-500">
        <datalist id="cloud-models"></datalist>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">API Key *</label>
        <input id="run-api-key" type="password" placeholder="sk-... or AIza..."
               class="px-3 py-1.5 rounded-md border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-sm w-full focus:outline-none focus:ring-2 focus:ring-blue-500">
        <p class="text-xs text-gray-400 dark:text-gray-500 mt-1">Not stored — only used for this run.</p>
      </div>
    </div>
  </div>

  <!-- Common parameters -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-5">
    <div>
      <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Temperature</label>
      <input id="run-temperature" type="number" value="0.1" min="0" max="2" step="0.1"
             class="px-3 py-1.5 rounded-md border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-sm w-full focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <div class="flex items-end">
      <label class="flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300 pb-1.5">
        <input id="run-think" type="checkbox" class="rounded border-gray-300 dark:border-gray-600">
        Enable Thinking
      </label>
    </div>
  </div>

  <!-- System prompt -->
  <div class="mb-6">
    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">System Prompt</label>
    <textarea id="run-system-prompt" rows="3"
              class="px-3 py-1.5 rounded-md border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-sm w-full font-mono focus:outline-none focus:ring-2 focus:ring-blue-500">{{ default_system_prompt }}</textarea>
  </div>

  <!-- Submit -->
  <div class="flex items-center gap-3">
    <button onclick="startRun()" id="start-btn"
            class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-5 py-2 rounded-md transition-colors">
      Start Run
    </button>
    <span id="start-error" class="text-red-500 text-sm hidden"></span>
  </div>

</div>

<script>
let currentProvider = 'ollama';
let ollamaModelsCached = null;

const openaiModels = [
  'gpt-5.4', 'gpt-5.4-mini', 'gpt-5.4-nano',
  'gpt-5.2', 'gpt-5.1',
  'gpt-5', 'gpt-5-mini', 'gpt-5-nano',
  'gpt-4.1', 'gpt-4.1-mini', 'gpt-4.1-nano',
  'gpt-4o', 'gpt-4o-mini',
  'o4-mini', 'o3',
  'gpt-5.3-chat-latest', 'gpt-5.2-chat-latest',
  'gpt-5.1-chat-latest', 'gpt-5-chat-latest',
  'chatgpt-4o-latest'
];

const geminiModels = [
  'gemini-3.1-pro', 'gemini-3-flash', 'gemini-3.1-flash-lite',
  'gemini-2.5-pro', 'gemini-2.5-flash', 'gemini-2.5-flash-lite'
];

function populateDatalist(datalistId, models) {
  const dl = document.getElementById(datalistId);
  dl.innerHTML = models.map(m => `<option value="${m}">`).join('');
}

function fetchOllamaModels() {
  if (ollamaModelsCached) {
    populateDatalist('ollama-models', ollamaModelsCached);
    return;
  }
  fetch('/api/ollama/models/json')
    .then(r => r.json())
    .then(models => {
      ollamaModelsCached = models;
      populateDatalist('ollama-models', models);
    })
    .catch(() => {});
}

function fetchLlamaCppModels() {
  fetch('/api/llamacpp/models/json')
    .then(r => r.json())
    .then(models => {
      populateDatalist('llamacpp-models', models);
      if (models.length === 1 && !document.getElementById('run-llamacpp-model').value) {
        document.getElementById('run-llamacpp-model').value = models[0];
      }
    })
    .catch(() => {});
}

function selectProvider(provider) {
  currentProvider = provider;
  document.querySelectorAll('.provider-btn').forEach(btn => {
    btn.classList.remove('bg-blue-600', 'text-white', 'border-blue-600');
    btn.classList.add('border-gray-300', 'dark:border-gray-600', 'text-gray-600', 'dark:text-gray-400');
  });
  const active = document.getElementById('btn-' + provider);
  active.classList.add('bg-blue-600', 'text-white', 'border-blue-600');
  active.classList.remove('border-gray-300', 'dark:border-gray-600', 'text-gray-600', 'dark:text-gray-400');

  document.getElementById('ollama-fields').classList.toggle('hidden', provider !== 'ollama');
  document.getElementById('llamacpp-fields').classList.toggle('hidden', provider !== 'llamacpp');
  document.getElementById('cloud-fields').classList.toggle('hidden', provider === 'ollama' || provider === 'llamacpp');

  if (provider === 'ollama') {
    fetchOllamaModels();
  } else if (provider === 'llamacpp') {
    fetchLlamaCppModels();
  } else if (provider === 'openai') {
    populateDatalist('cloud-models', openaiModels);
    document.getElementById('run-cloud-model').placeholder = 'e.g. gpt-5.4, o3';
  } else if (provider === 'gemini') {
    populateDatalist('cloud-models', geminiModels);
    document.getElementById('run-cloud-model').placeholder = 'e.g. gemini-2.5-flash';
  }
}

function toggleBatchMode() {
  const isBatch = document.getElementById('batch-mode').checked;
  document.getElementById('single-model-field').classList.toggle('hidden', isBatch);
  document.getElementById('batch-models-field').classList.toggle('hidden', !isBatch);
  document.getElementById('start-btn').textContent = isBatch ? 'Start Batch Run' : 'Start Run';
}

function startRun() {
  const errorEl = document.getElementById('start-error');
  errorEl.classList.add('hidden');

  const isBatch = currentProvider === 'ollama' && document.getElementById('batch-mode').checked;
  let api_key = '', api_url = '';

  if (isBatch) {
    api_url = document.getElementById('run-api-url').value.trim();
    const models = document.getElementById('run-batch-models').value
      .split('\n').map(s => s.trim()).filter(Boolean);
    if (!models.length) {
      errorEl.textContent = 'Enter at least one model name';
      errorEl.classList.remove('hidden');
      return;
    }
    const payload = {
      models: models,
      api_url: api_url,
      temperature: parseFloat(document.getElementById('run-temperature').value),
      think: document.getElementById('run-think').checked,
      system_prompt: document.getElementById('run-system-prompt').value,
    };
    const btn = document.getElementById('start-btn');
    btn.disabled = true;
    btn.textContent = 'Starting...';
    fetch('/api/runs/batch', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload),
    })
    .then(r => r.json())
    .then(data => {
      if (data.error) {
        errorEl.textContent = data.error;
        errorEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Start Batch Run';
        return;
      }
      window.location.href = '/runs/progress/' + data.task_id;
    })
    .catch(err => {
      errorEl.textContent = 'Request failed: ' + err.message;
      errorEl.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = 'Start Batch Run';
    });
    return;
  }

  let model;
  if (currentProvider === 'ollama') {
    model = document.getElementById('run-model').value.trim();
    api_url = document.getElementById('run-api-url').value.trim();
  } else if (currentProvider === 'llamacpp') {
    model = document.getElementById('run-llamacpp-model').value.trim();
    api_url = document.getElementById('run-llamacpp-url').value.trim();
  } else {
    model = document.getElementById('run-cloud-model').value.trim();
    api_key = document.getElementById('run-api-key').value.trim();
  }

  if (!model) {
    errorEl.textContent = 'Model name is required';
    errorEl.classList.remove('hidden');
    return;
  }

  const payload = {
    provider: currentProvider,
    model: model,
    api_key: api_key,
    api_url: api_url,
    temperature: parseFloat(document.getElementById('run-temperature').value),
    think: document.getElementById('run-think').checked,
    system_prompt: document.getElementById('run-system-prompt').value,
  };

  const btn = document.getElementById('start-btn');
  btn.disabled = true;
  btn.textContent = 'Starting...';

  fetch('/api/runs', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(payload),
  })
  .then(r => r.json())
  .then(data => {
    if (data.error) {
      errorEl.textContent = data.error;
      errorEl.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = 'Start Run';
      return;
    }
    window.location.href = '/runs/progress/' + data.task_id;
  })
  .catch(err => {
    errorEl.textContent = 'Request failed: ' + err.message;
    errorEl.classList.remove('hidden');
    btn.disabled = false;
    btn.textContent = 'Start Run';
  });
}

// Initialize
selectProvider('ollama');
fetchOllamaModels();
</script>
{% endblock %}
