{% extends "base.html" %}
{% block title %}llama.cpp Server — llm-bug-bench{% endblock %}
{% block nav_llamacpp %}text-white font-semibold{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">llama.cpp Server</h1>

<!-- Server URL config -->
<div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg shadow-sm p-4 mb-6">
  <div class="flex items-center gap-3">
    <label class="text-sm font-medium text-gray-600 dark:text-gray-400 whitespace-nowrap">Server URL</label>
    <input id="llamacpp-url-input" type="text" value="{{ llamacpp_url }}"
           class="flex-1 px-3 py-1.5 rounded-md border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    <button onclick="setLlamaCppUrl()"
            class="bg-gray-700 hover:bg-gray-600 text-white text-sm px-3 py-1.5 rounded-md transition-colors">
      Update
    </button>
  </div>
</div>

<!-- Server status -->
<div id="server-status">
  {% include "llamacpp/_server_status.html" %}
</div>

<script>
function setLlamaCppUrl() {
  const url = document.getElementById('llamacpp-url-input').value.trim();
  fetch('/api/llamacpp/url', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({url})
  }).then(() => {
    htmx.ajax('GET', '/api/llamacpp/status', {target: '#server-status'});
    showToast('Server URL updated', 'success');
  });
}
</script>
{% endblock %}
