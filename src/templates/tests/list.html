{% extends "base.html" %}
{% block title %}Test Cases — llm-bug-bench{% endblock %}
{% block nav_tests %}text-white font-semibold{% endblock %}
{% block content %}
<div class="flex items-center justify-between mb-6">
  <h1 class="text-2xl font-bold">Test Cases</h1>
  <a href="/tests/new"
     class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-3 py-1.5 rounded-md transition-colors">
    New Test
  </a>
</div>

<!-- Filters -->
<div class="flex flex-wrap gap-3 mb-6 text-sm">
  <div>
    <label class="text-gray-500 dark:text-gray-400 text-xs uppercase mr-1">Language</label>
    <select onchange="applyFilters()" id="filter-language"
            class="px-2 py-1 rounded border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-sm">
      <option value="">All</option>
      {% for lang in languages %}
        <option value="{{ lang }}" {% if filter_language == lang %}selected{% endif %}>{{ lang }}</option>
      {% endfor %}
    </select>
  </div>
  <div>
    <label class="text-gray-500 dark:text-gray-400 text-xs uppercase mr-1">Difficulty</label>
    <select onchange="applyFilters()" id="filter-difficulty"
            class="px-2 py-1 rounded border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-sm">
      <option value="">All</option>
      {% for d in difficulties %}
        <option value="{{ d }}" {% if filter_difficulty == d %}selected{% endif %}>{{ d }}</option>
      {% endfor %}
    </select>
  </div>
</div>

<div class="overflow-x-auto" id="tests-table">
  {% include "partials/_tests_table.html" %}
</div>

<script>
function applyFilters() {
  const lang = document.getElementById('filter-language').value;
  const diff = document.getElementById('filter-difficulty').value;
  const params = new URLSearchParams();
  if (lang) params.set('language', lang);
  if (diff) params.set('difficulty', diff);
  window.location.href = '/tests?' + params.toString();
}

function deleteTest(id) {
  if (!confirm('Delete test "' + id + '"? This cannot be undone.')) return;
  fetch('/api/tests/' + encodeURIComponent(id), {method: 'DELETE'})
    .then(r => r.json())
    .then(data => {
      if (data.ok) {
        const row = document.getElementById('test-row-' + id);
        if (row) row.remove();
        showToast('Test "' + id + '" deleted', 'info');
      } else if (data.error) {
        showToast(data.error, 'error');
      }
    });
}
</script>
{% endblock %}
